version: '3.8'

services:
  deemona-api:
    build: .
    container_name: deemona-finance-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_ENABLED=true
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - API_KEY=${API_KEY:-change-this-in-production}
      - WS_ENABLED=true
      - CORS_ORIGIN=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

