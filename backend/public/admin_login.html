<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Deemona Finance</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
    }
    
    .admin-login-container {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      padding: 48px;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
    }
    
    .admin-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .admin-logo-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    
    .admin-logo h1 {
      font-size: 28px;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 8px;
    }
    
    .admin-logo p {
      font-size: 14px;
      color: #94a3b8;
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 15px;
      transition: all 0.2s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #6366f1;
      background: rgba(30, 41, 59, 1);
    }
    
    .btn-admin-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn-admin-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
    }
    
    .btn-admin-login:active {
      transform: translateY(0);
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 13px;
      display: none;
    }
    
    .back-link {
      text-align: center;
      margin-top: 24px;
    }
    
    .back-link a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }
    
    .back-link a:hover {
      color: #6366f1;
    }
  </style>
</head>
<body>
  <div class="admin-login-container">
    <div class="admin-logo">
      <div class="admin-logo-icon">🔐</div>
      <h1>Admin Portal</h1>
      <p>Deemona Finance Platform</p>
    </div>
    
    <div id="errorMessage" class="error-message"></div>
    
    <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
      <div class="form-group">
        <label class="form-label">Admin Username</label>
        <input type="email" id="adminUsername" class="form-input" placeholder="admin@deemona.com" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">Admin Password</label>
        <input type="password" id="adminPassword" class="form-input" placeholder="Enter your admin password" required>
      </div>
      
      <button type="submit" class="btn-admin-login">
        🔓 Access Admin Panel
      </button>
    </form>
    
    <div class="back-link">
      <a href="/login.html">← Back to User Login</a>
    </div>
  </div>
  
  <script>
    function handleAdminLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('adminUsername').value;
      const password = document.getElementById('adminPassword').value;
      const errorDiv = document.getElementById('errorMessage');
      
      // Admin credentials (in production, validate against backend)
      const ADMIN_USERNAME = 'admin@deemona.com';
      const ADMIN_PASSWORD = 'Deemona@Admin2024!';
      
      if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
        // Store admin session
        sessionStorage.setItem('admin_authenticated', 'true');
        sessionStorage.setItem('admin_username', username);
        sessionStorage.setItem('admin_login_time', new Date().toISOString());
        
        // Redirect to admin panel
        window.location.href = '/admin_panel.html';
      } else {
        errorDiv.textContent = '🚫 Invalid admin credentials. Access denied.';
        errorDiv.style.display = 'block';
        
        setTimeout(() => {
          errorDiv.style.display = 'none';
        }, 5000);
      }
    }
  </script>
</body>
</html>
