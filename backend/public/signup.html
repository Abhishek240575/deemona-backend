<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Deemona Finance Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signup-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 480px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .terms-acceptance {
            margin: 25px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #dee2e6;
            transition: all 0.3s;
        }

        .terms-checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .terms-checkbox-wrapper input[type="checkbox"] {
            margin-right: 10px;
            margin-top: 3px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .terms-text {
            font-size: 14px;
            line-height: 1.6;
            color: #495057;
        }

        .terms-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .terms-text a:hover {
            border-bottom-color: #667eea;
        }

        .terms-text .required {
            color: #dc3545;
            font-weight: 700;
        }

        .terms-disclaimer {
            margin-top: 12px;
            padding: 12px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            font-size: 13px;
            line-height: 1.5;
            color: #856404;
        }

        .message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s;
            display: none;
        }

        .message.show {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        .error-msg {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
        }

        .success-msg {
            background: #dfd;
            color: #363;
            border-left: 4px solid #363;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #dee2e6;
        }

        .login-link p {
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .login-link a:hover {
            color: #5568d3;
            text-decoration: underline;
        }

        .password-hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 10000;
            overflow: auto;
            padding: 20px;
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            max-width: 900px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 25px 30px;
            background: #667eea;
            color: white;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 24px;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-body {
            padding: 30px;
            max-height: 60vh;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.7;
            color: #333;
        }

        .modal-body h3 {
            color: #667eea;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .modal-body ul {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .modal-footer {
            padding: 20px 30px;
            background: #f8f9fa;
            border-radius: 0 0 12px 12px;
            text-align: right;
            border-top: 1px solid #dee2e6;
        }

        .modal-footer button {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.3s;
        }

        .btn-accept {
            background: #28a745;
            color: white;
        }

        .btn-accept:hover {
            background: #218838;
        }

        .btn-decline {
            background: #6c757d;
            color: white;
        }

        .warning-box {
            background: #ffe6e6;
            border-left: 4px solid #dc3545;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
        }

        .warning-box h4 {
            color: #dc3545;
            margin-top: 0;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .signup-container {
                padding: 30px 20px;
            }
            .modal-content {
                margin: 20px auto;
            }
            .modal-body {
                padding: 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo">
            <h1>Deemona Finance</h1>
            <p>Create Your Account</p>
        </div>

        <div id="errorMsg" class="message error-msg"></div>
        <div id="successMsg" class="message success-msg"></div>

        <form onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="new-password" minlength="8">
                <div class="password-hint">Minimum 8 characters</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required autocomplete="new-password">
            </div>

            <!-- TERMS ACCEPTANCE -->
            <div class="terms-acceptance">
                <label class="terms-checkbox-wrapper">
                    <input type="checkbox" id="acceptTerms" required>
                    <span class="terms-text">
                        I have read and agree to the 
                        <a href="#" id="showTermsLink">Terms and Conditions</a>, 
                        <a href="#" id="showPrivacyLink">Privacy Policy</a>, and 
                        <a href="#" id="showAupLink">Acceptable Use Policy</a>
                        <span class="required">*</span>
                    </span>
                </label>

                <div class="terms-disclaimer">
                    <strong>⚠️ Important:</strong> By creating an account, you acknowledge that <strong>the platform owner is NOT responsible for any financial losses</strong> you may incur while using this platform.
                </div>
            </div>

            <button type="submit" id="signupBtn" class="btn btn-primary" disabled>
                Create Account
            </button>
        </form>

        <!-- LOGIN LINK -->
        <div class="login-link">
            <p>
                Already have an account? 
                <a href="login.html">Sign In</a>
            </p>
        </div>
    </div>

    <!-- TERMS MODAL -->
    <div id="termsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Terms and Conditions</h2>
                <button id="closeModal" class="modal-close">&times;</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-footer">
                <button id="acceptTermsButton" class="btn-accept">I Accept</button>
                <button id="declineTermsButton" class="btn-decline">Close</button>
            </div>
        </div>
    </div>

<script>
// TERMS CONTENT
const termsContent = `
    <h3>CRITICAL LIABILITY DISCLAIMER</h3>
    <div class="warning-box">
        <h4>⚠️ NO RESPONSIBILITY FOR FINANCIAL LOSSES</h4>
        <p><strong>THE OWNER, CREATOR, DEVELOPER, AND OPERATOR OF THIS PLATFORM EXPRESSLY DISCLAIM ALL RESPONSIBILITY AND LIABILITY FOR ANY FINANCIAL LOSSES, DAMAGES, OR ADVERSE OUTCOMES.</strong></p>
        <ul>
            <li>Use of this Platform</li>
            <li>Reliance on data, information, or analytics provided</li>
            <li>Business decisions made based on Platform content</li>
            <li>Errors, inaccuracies, or omissions in data</li>
            <li>System failures or downtime</li>
        </ul>
    </div>
    <h3>USER ASSUMES ALL RISK</h3>
    <p><strong>BY USING THIS PLATFORM, YOU AGREE THAT:</strong></p>
    <ul>
        <li>You use the Platform entirely at your own risk</li>
        <li>You are solely responsible for all business decisions</li>
        <li>The Owner shall NOT be held liable for any losses</li>
        <li>You waive any right to claim damages</li>
    </ul>
    <h3>NO FINANCIAL ADVICE</h3>
    <p><strong>THIS PLATFORM DOES NOT PROVIDE FINANCIAL ADVICE.</strong> Consult qualified professionals for financial decisions.</p>
`;

const privacyContent = `<h3>Privacy Policy Summary</h3><p>We collect account information and business data you upload. We do NOT sell your data.</p><p><strong>Your Rights:</strong> Access, correct, delete your data at any time.</p>`;
const aupContent = `<h3>Acceptable Use Policy</h3><p>Use the Platform lawfully for business purposes. Do not upload malware, access unauthorized accounts, or violate laws.</p>`;

// MODAL FUNCTIONALITY
const termsModal = document.getElementById('termsModal');
const modalBody = document.getElementById('modalBody');
const modalTitle = document.getElementById('modalTitle');
const acceptCheckbox = document.getElementById('acceptTerms');
const signupBtn = document.getElementById('signupBtn');

document.getElementById('showTermsLink').addEventListener('click', function(e) {
    e.preventDefault();
    modalTitle.textContent = 'Terms and Conditions';
    modalBody.innerHTML = termsContent;
    termsModal.style.display = 'block';
});

document.getElementById('showPrivacyLink').addEventListener('click', function(e) {
    e.preventDefault();
    modalTitle.textContent = 'Privacy Policy';
    modalBody.innerHTML = privacyContent;
    termsModal.style.display = 'block';
});

document.getElementById('showAupLink').addEventListener('click', function(e) {
    e.preventDefault();
    modalTitle.textContent = 'Acceptable Use Policy';
    modalBody.innerHTML = aupContent;
    termsModal.style.display = 'block';
});

document.getElementById('closeModal').addEventListener('click', () => termsModal.style.display = 'none');
document.getElementById('declineTermsButton').addEventListener('click', () => termsModal.style.display = 'none');

document.getElementById('acceptTermsButton').addEventListener('click', function() {
    acceptCheckbox.checked = true;
    signupBtn.disabled = false;
    termsModal.style.display = 'none';
    
    const termsBox = document.querySelector('.terms-acceptance');
    termsBox.style.background = '#d4edda';
    termsBox.style.borderColor = '#c3e6cb';
    setTimeout(() => {
        termsBox.style.background = '#f8f9fa';
        termsBox.style.borderColor = '#dee2e6';
    }, 2000);
});

termsModal.addEventListener('click', (e) => {
    if (e.target === termsModal) termsModal.style.display = 'none';
});

acceptCheckbox.addEventListener('change', function() {
    signupBtn.disabled = !this.checked;
});

// SIGNUP LOGIC
async function handleSignup(e) {
    e.preventDefault();
    
    const btn = document.getElementById('signupBtn');
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    hideMessages();
    
    // Validate terms acceptance
    if (!acceptCheckbox.checked) {
        showError('⚠️ You must accept the Terms and Conditions to create an account.');
        
        const termsBox = document.querySelector('.terms-acceptance');
        termsBox.style.background = '#f8d7da';
        termsBox.style.borderColor = '#dc3545';
        setTimeout(() => {
            termsBox.style.background = '#f8f9fa';
            termsBox.style.borderColor = '#dee2e6';
        }, 3000);
        
        return false;
    }
    
    // Validate passwords match
    if (password !== confirmPassword) {
        showError('Passwords do not match!');
        document.getElementById('confirmPassword').focus();
        return false;
    }
    
    // Validate password length
    if (password.length < 8) {
        showError('Password must be at least 8 characters long!');
        document.getElementById('password').focus();
        return false;
    }
    
    btn.disabled = true;
    btn.textContent = 'Creating Account...';
    
    try {
        const apiUrl = localStorage.getItem('deemona_api_url') || 'https://deemona-backend.onrender.com';
        
        const res = await fetch(apiUrl + '/v1/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                name,
                email, 
                password,
                acceptedTerms: true,
                termsAcceptedAt: new Date().toISOString()
            }),
            signal: AbortSignal.timeout(10000)
        });
        
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || 'Signup failed (HTTP ' + res.status + ')');
        }
        
        const data = await res.json();
        
        showSuccess('Account created successfully! Redirecting to login...');
        
        // Redirect to login page after 2 seconds
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2000);
        
    } catch (err) {
        showError(err.message || 'Signup failed. Please try again.');
        btn.disabled = !acceptCheckbox.checked;
        btn.textContent = 'Create Account';
    }
}

function showError(msg) { 
    const el = document.getElementById('errorMsg'); 
    el.textContent = msg; 
    el.classList.add('show'); 
}

function showSuccess(msg) { 
    const el = document.getElementById('successMsg'); 
    el.textContent = msg; 
    el.classList.add('show'); 
}

function hideMessages() { 
    document.getElementById('errorMsg').classList.remove('show'); 
    document.getElementById('successMsg').classList.remove('show'); 
}
</script>
</body>
</html>
