<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Deemona Finance Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0e27;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signup-container {
            background: rgba(20, 25, 45, 0.95);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(34, 211, 124, 0.2);
            width: 100%;
            max-width: 480px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #22d37c;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(34, 211, 124, 0.3);
        }

        .logo p {
            color: #8b92a7;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #22d37c;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            background: rgba(15, 20, 35, 0.6);
            border: 2px solid rgba(34, 211, 124, 0.3);
            border-radius: 6px;
            font-size: 15px;
            color: #fff;
            transition: all 0.3s;
        }

        .form-group input::placeholder {
            color: #5a6278;
        }

        .form-group input:focus {
            outline: none;
            border-color: #22d37c;
            background: rgba(15, 20, 35, 0.8);
            box-shadow: 0 0 0 3px rgba(34, 211, 124, 0.1);
        }

        .password-hint {
            font-size: 12px;
            color: #8b92a7;
            margin-top: 5px;
        }

        .terms-acceptance {
            margin: 25px 0;
            padding: 15px;
            background: rgba(34, 211, 124, 0.05);
            border-radius: 6px;
            border: 1px solid rgba(34, 211, 124, 0.2);
            transition: all 0.3s;
        }

        .terms-checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .terms-checkbox-wrapper input[type="checkbox"] {
            margin-right: 10px;
            margin-top: 3px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #22d37c;
        }

        .terms-text {
            font-size: 14px;
            line-height: 1.6;
            color: #b4bac9;
        }

        .terms-text a {
            color: #22d37c;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .terms-text a:hover {
            border-bottom-color: #22d37c;
        }

        .terms-text .required {
            color: #ef4444;
            font-weight: 700;
        }

        .terms-disclaimer {
            margin-top: 12px;
            padding: 12px;
            background: rgba(251, 191, 36, 0.1);
            border-left: 4px solid #fbbf24;
            font-size: 13px;
            line-height: 1.5;
            color: #fbbf24;
        }

        .message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s;
            display: none;
        }

        .message.show {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-left: 4px solid #ef4444;
        }

        .success-msg {
            background: rgba(34, 211, 124, 0.1);
            color: #22d37c;
            border-left: 4px solid #22d37c;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #22d37c 0%, #1ba35c 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(34, 211, 124, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #1ba35c 0%, #158a4d 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 211, 124, 0.4);
        }

        .btn-primary:disabled {
            background: rgba(107, 114, 128, 0.3);
            cursor: not-allowed;
            opacity: 0.6;
            box-shadow: none;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(34, 211, 124, 0.2);
        }

        .login-link p {
            color: #8b92a7;
            font-size: 14px;
        }

        .login-link a {
            color: #22d37c;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .login-link a:hover {
            color: #1ba35c;
            text-decoration: underline;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            overflow: auto;
            padding: 20px;
        }

        .modal-content {
            background: #14192d;
            margin: 50px auto;
            max-width: 900px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(34, 211, 124, 0.2);
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 25px 30px;
            background: linear-gradient(135deg, #22d37c 0%, #1ba35c 100%);
            color: white;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 24px;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-body {
            padding: 30px;
            max-height: 60vh;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.7;
            color: #b4bac9;
        }

        .modal-body h3 {
            color: #22d37c;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .modal-body ul {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .modal-footer {
            padding: 20px 30px;
            background: rgba(15, 20, 35, 0.5);
            border-radius: 0 0 12px 12px;
            text-align: right;
            border-top: 1px solid rgba(34, 211, 124, 0.2);
        }

        .modal-footer button {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.3s;
        }

        .btn-accept {
            background: linear-gradient(135deg, #22d37c 0%, #1ba35c 100%);
            color: white;
        }

        .btn-accept:hover {
            background: linear-gradient(135deg, #1ba35c 0%, #158a4d 100%);
        }

        .btn-decline {
            background: rgba(107, 114, 128, 0.2);
            color: #8b92a7;
        }

        .warning-box {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
        }

        .warning-box h4 {
            color: #ef4444;
            margin-top: 0;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .signup-container {
                padding: 30px 20px;
            }
            .modal-content {
                margin: 20px auto;
            }
            .modal-body {
                padding: 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo">
            <h1>Deemona Finance</h1>
            <p>Create Your Account</p>
        </div>

        <div id="errorMsg" class="message error-msg"></div>
        <div id="successMsg" class="message success-msg"></div>

        <form onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required autocomplete="name" placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required autocomplete="email" placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="new-password" minlength="8" placeholder="••••••••">
                <div class="password-hint">Minimum 8 characters</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required autocomplete="new-password" placeholder="••••••••">
            </div>

            <!-- TERMS ACCEPTANCE -->
            <div class="terms-acceptance">
                <label class="terms-checkbox-wrapper">
                    <input type="checkbox" id="acceptTerms" required>
                    <span class="terms-text">
                        I have read and agree to the 
                        <a href="#" id="showTermsLink">Terms and Conditions</a>, 
                        <a href="#" id="showPrivacyLink">Privacy Policy</a>, and 
                        <a href="#" id="showAupLink">Acceptable Use Policy</a>
                        <span class="required">*</span>
                    </span>
                </label>

                <div class="terms-disclaimer">
                    <strong>⚠️ Important:</strong> By creating an account, you acknowledge that <strong>the platform owner is NOT responsible for any financial losses</strong> you may incur.
                </div>
            </div>

            <button type="submit" id="signupBtn" class="btn btn-primary" disabled>
                Create Account
            </button>
        </form>

        <!-- LOGIN LINK -->
        <div class="login-link">
            <p>
                Already have an account? 
                <a href="login.html">Sign In</a>
            </p>
        </div>
    </div>

    <!-- TERMS MODAL -->
    <div id="termsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Terms and Conditions</h2>
                <button id="closeModal" class="modal-close">&times;</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-footer">
                <button id="acceptTermsButton" class="btn-accept">I Accept</button>
                <button id="declineTermsButton" class="btn-decline">Close</button>
            </div>
        </div>
    </div>

<script>
// TERMS CONTENT
const termsContent = `
    <h3>CRITICAL LIABILITY DISCLAIMER</h3>
    <div class="warning-box">
        <h4>⚠️ NO RESPONSIBILITY FOR FINANCIAL LOSSES</h4>
        <p><strong>THE OWNER, CREATOR, DEVELOPER, AND OPERATOR OF THIS PLATFORM EXPRESSLY DISCLAIM ALL RESPONSIBILITY AND LIABILITY FOR ANY FINANCIAL LOSSES, DAMAGES, OR ADVERSE OUTCOMES.</strong></p>
        <ul>
            <li>Use of this Platform</li>
            <li>Reliance on data, information, or analytics provided</li>
            <li>Business decisions made based on Platform content</li>
            <li>Errors, inaccuracies, or omissions in data</li>
            <li>System failures or downtime</li>
        </ul>
    </div>
    <h3>USER ASSUMES ALL RISK</h3>
    <p><strong>BY USING THIS PLATFORM, YOU AGREE THAT:</strong></p>
    <ul>
        <li>You use the Platform entirely at your own risk</li>
        <li>You are solely responsible for all business decisions</li>
        <li>The Owner shall NOT be held liable for any losses</li>
        <li>You waive any right to claim damages</li>
    </ul>
    <h3>NO FINANCIAL ADVICE</h3>
    <p><strong>THIS PLATFORM DOES NOT PROVIDE FINANCIAL ADVICE.</strong> Consult qualified professionals for financial decisions.</p>
`;

const privacyContent = `<h3>Privacy Policy Summary</h3><p>We collect account information and business data you upload. We do NOT sell your data.</p><p><strong>Your Rights:</strong> Access, correct, delete your data at any time.</p>`;
const aupContent = `<h3>Acceptable Use Policy</h3><p>Use the Platform lawfully for business purposes. Do not upload malware, access unauthorized accounts, or violate laws.</p>`;

// MODAL FUNCTIONALITY
const termsModal = document.getElementById('termsModal');
const modalBody = document.getElementById('modalBody');
const modalTitle = document.getElementById('modalTitle');
const acceptCheckbox = document.getElementById('acceptTerms');
const signupBtn = document.getElementById('signupBtn');

document.getElementById('showTermsLink').addEventListener('click', function(e) {
    e.preventDefault();
    modalTitle.textContent = 'Terms and Conditions';
    modalBody.innerHTML = termsContent;
    termsModal.style.display = 'block';
});

document.getElementById('showPrivacyLink').addEventListener('click', function(e) {
    e.preventDefault();
    modalTitle.textContent = 'Privacy Policy';
    modalBody.innerHTML = privacyContent;
    termsModal.style.display = 'block';
});

document.getElementById('showAupLink').addEventListener('click', function(e) {
    e.preventDefault();
    modalTitle.textContent = 'Acceptable Use Policy';
    modalBody.innerHTML = aupContent;
    termsModal.style.display = 'block';
});

document.getElementById('closeModal').addEventListener('click', () => termsModal.style.display = 'none');
document.getElementById('declineTermsButton').addEventListener('click', () => termsModal.style.display = 'none');

document.getElementById('acceptTermsButton').addEventListener('click', function() {
    acceptCheckbox.checked = true;
    signupBtn.disabled = false;
    termsModal.style.display = 'none';
    
    const termsBox = document.querySelector('.terms-acceptance');
    termsBox.style.background = 'rgba(34, 211, 124, 0.15)';
    termsBox.style.borderColor = '#22d37c';
    setTimeout(() => {
        termsBox.style.background = 'rgba(34, 211, 124, 0.05)';
        termsBox.style.borderColor = 'rgba(34, 211, 124, 0.2)';
    }, 2000);
});

termsModal.addEventListener('click', (e) => {
    if (e.target === termsModal) termsModal.style.display = 'none';
});

acceptCheckbox.addEventListener('change', function() {
    signupBtn.disabled = !this.checked;
});

// SIGNUP LOGIC
async function handleSignup(e) {
    e.preventDefault();
    
    const btn = document.getElementById('signupBtn');
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    hideMessages();
    
    if (!acceptCheckbox.checked) {
        showError('⚠️ You must accept the Terms and Conditions to create an account.');
        
        const termsBox = document.querySelector('.terms-acceptance');
        termsBox.style.background = 'rgba(239, 68, 68, 0.15)';
        termsBox.style.borderColor = '#ef4444';
        setTimeout(() => {
            termsBox.style.background = 'rgba(34, 211, 124, 0.05)';
            termsBox.style.borderColor = 'rgba(34, 211, 124, 0.2)';
        }, 3000);
        
        return false;
    }
    
    if (password !== confirmPassword) {
        showError('Passwords do not match!');
        document.getElementById('confirmPassword').focus();
        return false;
    }
    
    if (password.length < 8) {
        showError('Password must be at least 8 characters long!');
        document.getElementById('password').focus();
        return false;
    }
    
    btn.disabled = true;
    btn.textContent = 'Creating Account...';
    
    try {
        const apiUrl = localStorage.getItem('deemona_api_url') || 'https://deemona-backend.onrender.com';
        
        const res = await fetch(apiUrl + '/v1/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                name,
                email, 
                password,
                acceptedTerms: true,
                termsAcceptedAt: new Date().toISOString()
            }),
            signal: AbortSignal.timeout(10000)
        });
        
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || 'Signup failed (HTTP ' + res.status + ')');
        }
        
        const data = await res.json();
        
        showSuccess('Account created successfully! Redirecting to login...');
        
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2000);
        
    } catch (err) {
        showError(err.message || 'Signup failed. Please try again.');
        btn.disabled = !acceptCheckbox.checked;
        btn.textContent = 'Create Account';
    }
}

function showError(msg) { 
    const el = document.getElementById('errorMsg'); 
    el.textContent = msg; 
    el.classList.add('show'); 
}

function showSuccess(msg) { 
    const el = document.getElementById('successMsg'); 
    el.textContent = msg; 
    el.classList.add('show'); 
}

function hideMessages() { 
    document.getElementById('errorMsg').classList.remove('show'); 
    document.getElementById('successMsg').classList.remove('show'); 
}
</script>
</body>
</html>
