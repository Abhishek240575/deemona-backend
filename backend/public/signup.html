<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Deemona Finance Solution</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='18' width='100' height='100' fill='%230d9488'/><text x='50' y='68' text-anchor='middle' font-size='58' font-weight='700' fill='white' font-family='serif'>D</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#070b14;--accent:#0d9488;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--red:#ef4444;--green:#10b981}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.signup-container{width:100%;max-width:480px;padding:20px}
.logo-section{text-align:center;margin-bottom:40px}
.logo-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#0d9488,#0f766e);display:inline-flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:34px;color:#fff;margin-bottom:16px}
.logo-brand{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;background:linear-gradient(135deg,#5eead4,#2dd4bf,#14b8a6,#0d9488);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.signup-card{background:rgba(17,24,39,.7);backdrop-filter:blur(20px);border:1px solid rgba(148,163,184,.08);border-radius:16px;padding:32px}
.signup-title{font-size:20px;font-weight:700;margin-bottom:4px}
.signup-subtitle{font-size:13px;color:var(--text3);margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:6px}
.form-input{width:100%;background:rgba(26,34,54,.8);border:1px solid rgba(148,163,184,.12);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.signup-btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#0d9488,#0f766e);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.signup-btn:disabled{opacity:.6;cursor:not-allowed}
.error-msg{display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--red)}
.error-msg.show{display:block}
.success-msg{display:none;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--green);font-weight:500;line-height:1.6}
.success-msg.show{display:block}
.login-link{text-align:center;margin-top:20px;font-size:12px;color:var(--text3)}
.login-link a{color:var(--accent);text-decoration:none;font-weight:600}
.login-link a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="signup-container">
<div class="logo-section">
  <div class="logo-icon">D</div>
  <div class="logo-brand">Deemona Finance Solution</div>
</div>

<div class="signup-card">
  <div class="signup-title">Create your account</div>
  <div class="signup-subtitle">Start your 30-day free trial</div>
<div class="success-msg" id="successMsg"></div>
  <div class="error-msg" id="errorMsg"></div>
  

  <form id="signupForm" onsubmit="handleSignup(event)">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">First Name</label>
        <input class="form-input" type="text" id="firstName" required>
      </div>
      <div class="form-group">
        <label class="form-label">Last Name</label>
        <input class="form-input" type="text" id="lastName" required>
      </div>
    </div>
    
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="email" required>
    </div>
    
    <div class="form-group">
      <label class="form-label">Company Name (Optional)</label>
      <input class="form-input" type="text" id="companyName">
    </div>
    
    <div class="form-group">
      <label class="form-label">Password (min 8 characters)</label>
      <input class="form-input" type="password" id="password" required minlength="8">
    </div>
    
    <button class="signup-btn" type="submit" id="signupBtn">Create Account</button>
  </form>

  <div class="login-link">
    Already have an account? <a href="login.html">Sign in</a>
  </div>
</div>
</div>

<script>
const API_URL = localStorage.getItem('deemona_api_url') || 'https://deemona-backend.onrender.com';
function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  if (el) {
    el.textContent = msg;
    el.classList.add('show');
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  if (el) {
    el.textContent = msg;
    el.classList.add('show');
  }
}

function hideMessages() {
  const successEl = document.getElementById('successMsg');
  const errorEl = document.getElementById('errorMsg');
  if (successEl) successEl.classList.remove('show');
  if (errorEl) errorEl.classList.remove('show');
}

async function handleSignup(e) {
  e.preventDefault();
  
  const btn = document.getElementById('signupBtn');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const companyName = document.getElementById('companyName').value.trim();
  
  hideMessages();
  btn.disabled = true;
  btn.textContent = 'Creating account...';
  
  try {
    const res = await fetch(API_URL + '/v1/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, firstName, lastName, companyName })
    });
    
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      
      if (res.status === 409) {
        showError('❌ This email is already registered. Please use a different email or try logging in.');
      } else {
        showError('❌ ' + (err.error || 'Registration failed. Please try again.'));
      }
      
      btn.disabled = false;
      btn.textContent = 'Create Account';
      return;
    }
    
    const data = await res.json();
    
    hideMessages();
    
    showSuccess('✅ Account created successfully! We sent a verification email to ' + email + '. Please check your inbox and click the verification link before logging in.');
    
    document.getElementById('signupForm').reset();
    
    btn.disabled = false;
    btn.textContent = 'Create Account';
    
  } catch (err) {
    showError('❌ ' + (err.message || 'Network error. Please try again.'));
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}
</script>
</body>
</html>
