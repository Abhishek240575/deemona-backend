<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Deemona Finance Solution</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='18' width='100' height='100' fill='%230d9488'/><text x='50' y='68' text-anchor='middle' font-size='58' font-weight='700' fill='white' font-family='serif'>D</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#070b14;--accent:#0d9488;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--green:#10b981}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{width:100%;max-width:450px;padding:20px}
.logo-section{text-align:center;margin-bottom:40px}
.logo-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#0d9488,#0f766e);display:inline-flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:34px;color:#fff;margin-bottom:16px}
.logo-brand{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;background:linear-gradient(135deg,#5eead4,#2dd4bf,#14b8a6,#0d9488);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:rgba(17,24,39,.7);backdrop-filter:blur(20px);border:1px solid rgba(148,163,184,.08);border-radius:16px;padding:32px}
.title{font-size:20px;font-weight:700;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text3);margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:6px}
.form-input{width:100%;background:rgba(26,34,54,.8);border:1px solid rgba(148,163,184,.12);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none}
.form-input:focus{border-color:var(--accent)}
.btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#0d9488,#0f766e);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:disabled{opacity:.6;cursor:not-allowed}
.message{display:none;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px}
.message.success{display:block;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:var(--green)}
.message.error{display:block;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444}
.link{text-align:center;margin-top:20px;font-size:12px;color:var(--text3)}
.link a{color:var(--accent);text-decoration:none;font-weight:600}
.link a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="container">
<div class="logo-section">
  <div class="logo-icon">D</div>
  <div class="logo-brand">Deemona Finance Solution</div>
</div>

<div class="card">
  <div class="title">Create new password</div>
  <div class="subtitle">Enter your new password below</div>

  <div class="message" id="message"></div>

  <form id="resetForm" onsubmit="handleReset(event)">
    <div class="form-group">
      <label class="form-label">New Password (min 8 characters)</label>
      <input class="form-input" type="password" id="password" required minlength="8">
    </div>
    
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input class="form-input" type="password" id="confirmPassword" required minlength="8">
    </div>
    
    <button class="btn" type="submit" id="submitBtn">Reset Password</button>
  </form>

  <div class="link">
    Remember your password? <a href="login.html">Sign in</a>
  </div>
</div>
</div>

<script>
const API_URL = localStorage.getItem('deemona_api_url') || 'https://deemona-backend.onrender.com';

// Get token from URL
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

if (!token) {
  showError('Invalid reset link. Please request a new password reset.');
  document.getElementById('submitBtn').disabled = true;
}

async function handleReset(e) {
  e.preventDefault();
  
  const btn = document.getElementById('submitBtn');
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  
  if (password !== confirmPassword) {
    showError('Passwords do not match');
    return;
  }
  
  hideMessage();
  btn.disabled = true;
  btn.textContent = 'Resetting...';
  
  try {
    const res = await fetch(API_URL + '/v1/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    
    const data = await res.json();
    
    if (!res.ok) {
      throw new Error(data.error || 'Reset failed');
    }
    
    showSuccess('Password reset successful! Redirecting to login...');
    document.getElementById('resetForm').reset();
    
    setTimeout(() => {
      window.location.href = 'login.html';
    }, 2000);
    
  } catch (err) {
    showError(err.message);
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
}

function showSuccess(msg) {
  const el = document.getElementById('message');
  el.textContent = msg;
  el.className = 'message success';
}

function showError(msg) {
  const el = document.getElementById('message');
  el.textContent = msg;
  el.className = 'message error';
}

function hideMessage() {
  document.getElementById('message').className = 'message';
}
</script>
</body>
</html>
